<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
<style>
@keyframes sleepBreathe{0%,100%{transform:scale(1,1)}50%{transform:scale(1.01,1.04)}}
@keyframes zz{0%{opacity:0;transform:translate(0,0) scale(0.5)}40%{opacity:1}100%{opacity:0;transform:translate(12px,-24px) scale(1.1)}}
</style>
<ellipse cx="100" cy="166" rx="62" ry="6" fill="#2E2418" opacity="0.25"/>
<!-- pillow -->
<rect x="30" y="134" width="44" height="18" rx="8" fill="#E8E2D0"/>
<rect x="30" y="134" width="44" height="18" rx="8" fill="none" stroke="#D6CEB6" stroke-width="1.5"/>
<!-- body under scarf-blanket -->
<g style="transform-origin:100px 160px;animation:sleepBreathe 4.5s ease-in-out infinite">
  <path d="M66,160 Q66,140 86,138 L140,138 Q156,141 154,160 Z" fill="#3D3D55"/>
  <rect x="74" y="133" width="70" height="9" rx="4.5" fill="#7F0909"/>
  <rect x="86" y="133" width="9" height="9" fill="#E6A817"/>
  <rect x="106" y="133" width="9" height="9" fill="#E6A817"/>
  <rect x="126" y="133" width="9" height="9" fill="#E6A817"/>
  <!-- feet bump -->
  <ellipse cx="146" cy="138" rx="10" ry="5" fill="#3D3D55"/>
</g>
<!-- head on pillow (glasses off) -->
<g transform="translate(-22,59.5) scale(0.78)">
  <circle cx="100" cy="80" r="34" fill="#F6D6AE"/>
  <ellipse cx="82" cy="96" rx="5" ry="3" fill="#F0AE9B" opacity="0.6"/>
  <ellipse cx="118" cy="96" rx="5" ry="3" fill="#F0AE9B" opacity="0.6"/>
  <ellipse cx="100" cy="104" rx="2.6" ry="3.2" fill="#B4655A"/>
  <path d="M79,90 Q86,94 93,90" stroke="#2A1A0F" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M107,90 Q114,94 121,90" stroke="#2A1A0F" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M66,88 Q58,40 100,36 Q142,40 134,88 L130,72 L122,80 L118,64 L108,74 L104,60 L96,70 L92,56 L86,58 L82,72 L74,66 L70,80 Z" fill="#26221F"/>
  <polyline points="89,60 85,65 89,69 85,74" stroke="#C94F3D" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</g>
<!-- folded glasses beside pillow -->
<g transform="translate(22,158) rotate(-8)">
  <circle cx="0" cy="0" r="5" fill="none" stroke="#1C1C1C" stroke-width="1.8"/>
  <circle cx="8" cy="1" r="5" fill="none" stroke="#1C1C1C" stroke-width="1.8"/>
  <line x1="13" y1="0" x2="20" y2="-3" stroke="#1C1C1C" stroke-width="1.8" stroke-linecap="round"/>
</g>
<g style="animation:zz 3s ease-in-out infinite"><text x="86" y="112" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#8FA6C8">z</text></g>
<g style="animation:zz 3s ease-in-out infinite 1s"><text x="98" y="102" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#8FA6C8">Z</text></g>
<g style="animation:zz 3s ease-in-out infinite 2s"><text x="112" y="92" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="#7E96BC">Z</text></g>
</svg>
